<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PSUP TreeDB: DataTables</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon/favicon.ico" />
    <link rel="stylesheet" href="vendors/leaflet/1.9.4/leaflet.css"/>
    <link rel="stylesheet" href="vendors/bootstrap/5.2.3/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css"/>
    <link rel="stylesheet" href="vendors/datatables/datatables.min.css"/>

    <style>
        /* Base styles for the table */
        table#trees-table {
        font-family: Arial, Helvetica, sans-serif;
        border-collapse: collapse;
        width: 100%;
        overflow-x: auto;
        }

        /* Row striping */
        /* Use a light green and off-white color scheme for better readability and a nature-inspired look */
        table#trees-table tr:nth-child(even){
        background-color: #e8f5e9; /* very light green */
        }
        table#trees-table tr:nth-child(odd){
        background-color: #f7f8f5; /* off-white with a hint of green */
        }
        table#trees-table tr:hover {
        background-color: #c8e6c9; /* fresh green highlight */
        transition: background-color 0.3s ease;
        }

        /* Header styling */
        table#trees-table th {
        padding-top: 12px;
        padding-bottom: 12px;
        background-color: #2e7d32; /* deep forest green */
        color: rgb(234, 228, 228); /* off-white */
        font-weight: bold;
        text-align: center;
        }

    </style>
</head>
<body class="w3-light-grey">
    <div class="w3-container w3-white w3-padding-large">
        <h1 class="w3-jumbo w3-text-green w3-margin-bottom">PSUP TreeDB: DataTables</h1>
        <!-- 
        The table will be dynamically generated by DataTables, 
        and populated with tree data from trees_zone01.js
        -->
        <table id="trees-table" class="display" style="border: 1px solid rgb(109, 107, 107);">
            <caption style="color: #2e7d32;">ตารางข้อมูลต้นไม้และชีวมวล</caption>
            <tbody>
                <!-- Tree data will be dynamically inserted here with DataTables-->
            </tbody>
        </table>
    </div>

    <script src="vendors/leaflet/1.9.4/leaflet.js"></script>
    <script src="vendors/bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>
    <script src="vendors/datatables/datatables.min.js"></script>
    <script src="spdata/DBtoGIS.js"></script>
    <script src="scripts/trees_datatables.js"></script>
</body>
</html>
