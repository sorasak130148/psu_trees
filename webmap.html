
<!DOCTYPE html>
<html lang="en">
<head>
<title>PSUP TreeDB: Spatial Map</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<link rel="stylesheet" href="vendors/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="styles/webmap.css" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

<style>
  /* ===== CSS Variables ===== */
  :root {
    --green-dark:   #1b5e20;
    --green-mid:    #2e7d32;
    --green-light:  #43a047;
    --green-pale:   #e8f5e9;
    --green-accent: #66bb6a;
    --bark:         #5d4037;
    --bark-light:   #8d6e63;
    --sky:          #e3f2fd;
    --white:        #ffffff;
    --text-main:    #1a1a1a;
    --text-muted:   #546e7a;
    --shadow-soft:  0 4px 24px rgba(30,80,30,0.10);
    --shadow-card:  0 2px 12px rgba(30,80,30,0.13);
    --radius:       14px;
    --header-h:     130px;
  }

  /* ===== Base ===== */
  *, *::before, *::after { box-sizing: border-box; }

  body, h1, h2, h3, h4, h5, h6 {
    font-family: "Bai Jamjuree", sans-serif;
    margin: 0;
  }

  body {
    background: #f4f8f4;
    color: var(--text-main);
  }

  /* ===== Top Bar ===== */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, var(--green-light) 100%);
    box-shadow: 0 3px 20px rgba(0,0,0,0.18);
  }

  .top-bar-inner {
    max-width: 1300px;
    margin: auto;
    display: flex;
    align-items: center;
    padding: 0 8px;
    min-height: var(--header-h);
    gap: 12px;
  }

  /* Hamburger button */
  .menu-btn {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.30);
    border-radius: 10px;
    color: #fff;
    font-size: 1.5rem;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .menu-btn:hover {
    background: rgba(255,255,255,0.28);
    transform: scale(1.07);
  }

  /* Tree icon badge */
  .tree-badge {
    width: 58px;
    height: 58px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.35);
  }

  /* Title block */
  .title-block {
    flex: 1;
    text-align: center;
    padding: 10px 0;
  }

  .title-block h2 {
    color: #fff;
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    margin-bottom: 4px;
  }

  .title-block p {
    color: rgba(255,255,255,0.88);
    font-size: 0.82rem;
    font-weight: 300;
    line-height: 1.5;
    max-width: 640px;
    margin: 0 auto;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .stat-pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 20px;
    padding: 6px 14px;
    text-align: center;
    min-width: 70px;
  }

  .stat-pill .stat-num {
    display: block;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.1;
  }

  .stat-pill .stat-label {
    display: block;
    color: rgba(255,255,255,0.75);
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  /* Leaf strip decoration */
  .leaf-strip {
    height: 5px;
    background: linear-gradient(90deg, var(--green-accent), #a5d6a7, var(--green-accent));
  }

  /* ===== Sidebar ===== */
  #mySidebar {
    display: none;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 9999;
    width: 280px;
    background: var(--green-dark);
    box-shadow: 4px 0 30px rgba(0,0,0,0.25);
    animation: slideInLeft 0.25s ease;
    overflow-y: auto;
    flex-direction: column;
  }

  @keyframes slideInLeft {
    from { transform: translateX(-100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .sidebar-header {
    background: rgba(0,0,0,0.25);
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo {
    font-size: 1.8rem;
  }

  .sidebar-title {
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.2;
  }

  .sidebar-subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 0.72rem;
    font-weight: 300;
  }

  .sidebar-close {
    display: block;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.70);
    padding: 12px 20px;
    font-size: 0.82rem;
    cursor: pointer;
    border: none;
    text-align: left;
    width: 100%;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    letter-spacing: 0.5px;
    transition: background 0.18s, color 0.18s;
    text-decoration: none;
  }

  .sidebar-close:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .sidebar-section {
    padding: 12px 0 4px;
    color: rgba(255,255,255,0.40);
    font-size: 0.65rem;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding-left: 20px;
  }

  .sidebar-nav a {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.82);
    padding: 13px 20px;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 400;
    border-left: 3px solid transparent;
    transition: all 0.18s;
  }

  .sidebar-nav a:hover,
  .sidebar-nav a.active {
    background: rgba(255,255,255,0.10);
    color: #fff;
    border-left-color: var(--green-accent);
  }

  .sidebar-nav a .nav-icon {
    font-size: 1.1rem;
    width: 24px;
    text-align: center;
    opacity: 0.85;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 9998;
  }

  /* ===== Map container ===== */
  .map-wrapper {
    padding-top: var(--header-h);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #trees-map {
    flex: 1;
    width: 100%;
    min-height: 0;
  }

  /* ===== Map overlay badge ===== */
  .map-legend-badge {
    position: absolute;
    bottom: 30px;
    right: 14px;
    z-index: 500;
    background: rgba(255,255,255,0.95);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow-card);
    border-left: 4px solid var(--green-mid);
    font-size: 0.78rem;
    color: var(--text-main);
    max-width: 200px;
  }

  .map-legend-badge strong {
    display: block;
    color: var(--green-dark);
    margin-bottom: 6px;
    font-size: 0.85rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 700px) {
    :root { --header-h: 110px; }
    .stats-row { display: none; }
    .title-block h2 { font-size: 1.15rem; }
    .title-block p { font-size: 0.75rem; }
    .tree-badge { width: 44px; height: 44px; font-size: 1.6rem; }
  }
</style>

</head>

<body data-page="webmap">

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="w3_close()"></div>

<!-- Sidebar -->
<nav id="mySidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">🌳</div>
    <div>
      <div class="sidebar-title">PSUP TreeDB</div>
      <div class="sidebar-subtitle">ม.อ. วิทยาเขตภูเก็ต</div>
    </div>
  </div>

  <a href="javascript:void(0)" onclick="w3_close()" class="sidebar-close">✕ &nbsp; ปิดเมนู</a>

  <div class="sidebar-section">เมนูหลัก</div>
  <div class="sidebar-nav">
    <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
    <a href="webmap.html" class="active"><span class="nav-icon">🗺️</span> Map</a>
    <a href="diy_6000000000.html"><span class="nav-icon">📋</span> Table</a>
    <a href="plant_catalog.html"><span class="nav-icon">📖</span> Plant Catalog</a>
    <a href="graph.html"><span class="nav-icon">📊</span> Graph</a>
    <a href="about.html"><span class="nav-icon">ℹ️</span> About</a>
  </div>
</nav>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-bar-inner">

    <button class="menu-btn" onclick="w3_open()" title="เปิดเมนู">☰</button>

    <div class="tree-badge">🌲</div>

    <div class="title-block">
      <h2>PSUP TreeDB: Spatial Map</h2>
      <p>แผนที่แสดงตำแหน่งเชิงพื้นที่ของต้นไม้ พร้อมข้อมูลชีวมวลและปริมาณคาร์บอน<br>มหาวิทยาลัยสงขลานครินทร์ วิทยาเขตภูเก็ต</p>
    </div>

    <div class="stats-row">
      <div class="stat-pill">
        <span class="stat-num">🌳</span>
        <span class="stat-label">Trees</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num">CO₂</span>
        <span class="stat-label">Carbon</span>
      </div>
    </div>

  </div>
  <div class="leaf-strip"></div>
</div>

<!-- MAP -->
<div class="map-wrapper">
  <div id="trees-map"></div>
</div>

<script src="spdata/DBtoGIS.js"></script>
<script src="vendors/leaflet/1.9.4/leaflet.js"></script>
<script src="scripts/webmap.js"></script>

<script>
function w3_open() {
  const sb = document.getElementById("mySidebar");
  const ov = document.getElementById("sidebarOverlay");
  sb.style.display = "flex";
  ov.style.display = "block";
}

function w3_close() {
  const sb = document.getElementById("mySidebar");
  const ov = document.getElementById("sidebarOverlay");
  sb.style.display = "none";
  ov.style.display = "none";
}
</script>

</body>
</html>
